services:
  chat:
    build: .
    container_name: chat
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=chat-database
      - REDIS_PORT=6379
      - API_BASE
      - API_KEY
      - MODEL
      - TITLE_MODEL
      - MAX_TOKENS
      - TEMPERATURE
    depends_on:
      - redis

  redis:
    container_name: chat-database
    image: redis:8.0-M02-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
